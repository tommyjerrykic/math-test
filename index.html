<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>四則運算大冒險</title>
<style>
  :root{ --ink:#1b1b1b; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{-webkit-user-select:none;user-select:none;-webkit-text-size-adjust:100%;
    touch-action:manipulation;overscroll-behavior:none;}
  html,body{height:100%;margin:0;}
  body{font-family:"Microsoft JhengHei","PingFang TC","Heiti TC",sans-serif;
    background:linear-gradient(180deg,#8ecbff 0%,#bfe6ff 55%,#e8f7ff 100%);
    overflow:hidden;position:relative;color:#fff;}

  /* ===== 畫面切換 ===== */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;
    transition:opacity .45s ease, transform .45s ease;
    z-index:2;}
  .screen.hidden{opacity:0;transform:scale(1.03);pointer-events:none;visibility:hidden;z-index:1;}

  /* ===== 共用：Minecraft 浮雕按鈕 ===== */
  .mc-btn{position:relative;cursor:pointer;border:none;font-family:inherit;
    font-weight:800;color:#fff;letter-spacing:.08em;display:flex;align-items:center;gap:12px;
    justify-content:center;image-rendering:pixelated;transition:transform .05s,filter .05s;}
  .mc-btn:hover{filter:brightness(1.08);}
  @media(hover:none){ .mc-btn:hover{filter:none;} }
  .mc-btn:active{transform:translateY(4px);}

  /* ===== 主選單 ===== */
  .cloud{position:absolute;width:160px;height:80px;image-rendering:pixelated;
    opacity:.9;pointer-events:none;filter:drop-shadow(0 6px 0 rgba(0,0,0,.06));z-index:1;}
  .c1{top:12%;left:-180px;animation:drift 38s linear infinite;}
  .c2{top:26%;left:-180px;animation:drift 52s linear infinite 8s;transform:scale(.8);}
  .c3{top:6%; left:-180px;animation:drift 64s linear infinite 20s;transform:scale(1.1);}
  @keyframes drift{from{transform:translateX(0);}to{transform:translateX(120vw);}}

  .deco{position:absolute;image-rendering:pixelated;pointer-events:none;z-index:1;
    filter:drop-shadow(0 6px 6px rgba(0,0,0,.18));}
  .d-diamond{top:18%;right:8%;width:84px;animation:bob 3.2s ease-in-out infinite;}
  .d-apple  {top:60%;left:7%; width:78px;animation:bob 3.8s ease-in-out infinite .6s;}
  .d-torch  {top:30%;left:12%;width:60px;animation:bob 4.4s ease-in-out infinite .3s;}
  .d-creeper{top:55%;right:9%;width:90px;animation:bob 3.5s ease-in-out infinite .9s;}
  .d-coin   {top:14%;left:16%;width:70px;animation:bob 3s ease-in-out infinite .2s;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}

  .ground{position:absolute;left:0;bottom:0;width:100%;height:150px;z-index:1;}
  .grass{height:84px;background:url(grass_block.png) repeat-x;background-size:84px 84px;
    box-shadow:inset 0 3px 0 rgba(255,255,255,.35), inset 0 10px 16px rgba(0,0,0,.16);}
  .dirt {height:66px;background:url(dirt_block.png)  repeat-x;background-size:84px 84px;
         box-shadow:inset 0 8px 12px rgba(0,0,0,.15);}

  .menu{align-items:center;justify-content:center;gap:30px;padding:0 16px;z-index:2;}
  .title{font-size:clamp(34px,7vw,72px);font-weight:900;letter-spacing:.08em;
    color:#ffd23f;text-align:center;line-height:1.15;
    text-shadow:-3px -3px 0 #000,3px -3px 0 #000,-3px 3px 0 #000,3px 3px 0 #000,
      -3px 0 0 #000,3px 0 0 #000,0 -3px 0 #000,0 3px 0 #000,0 8px 0 #b5791a,0 11px 0 #000;
    animation:float 3.4s ease-in-out infinite, titleGlow 2.6s ease-in-out infinite;
    filter:drop-shadow(0 0 12px rgba(255,210,63,.5));}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  @keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 9px rgba(255,210,63,.4));}50%{filter:drop-shadow(0 0 24px rgba(255,210,63,.8));}}
  .tagline{margin-top:-14px;font-size:15px;color:#234;background:rgba(255,255,255,.55);
    padding:4px 14px;border-radius:4px;letter-spacing:.18em;font-weight:700;}
  .diff-now{margin-top:2px;font-size:14px;color:#234;background:rgba(255,255,255,.7);
    padding:5px 16px;border-radius:4px;font-weight:800;letter-spacing:.08em;
    border:2px solid rgba(0,0,0,.15);}

  .btns{display:flex;flex-direction:column;gap:20px;align-items:center;z-index:3;}
  .menu .mc-btn{font-size:23px;padding:15px 30px 15px 18px;min-width:300px;}
  .menu .mc-btn .ic{width:34px;height:34px;image-rendering:pixelated;}
  .menu .mc-btn.start  {background:#78af6e;
    box-shadow:inset 4px 4px 0 #a5d29b,inset -4px -4px 0 #50784b,0 6px 0 #2f472c,0 6px 0 4px #1c2a1a;text-shadow:2px 2px 0 #2f472c;}
  .menu .mc-btn.settings{background:#a0a0a0;
    box-shadow:inset 4px 4px 0 #cdcdcd,inset -4px -4px 0 #696969,0 6px 0 #4a4a4a,0 6px 0 4px #2c2c2c;text-shadow:2px 2px 0 #4a4a4a;}
  .menu .mc-btn.scores{background:#5b8bd0;
    box-shadow:inset 4px 4px 0 #8fb6e6,inset -4px -4px 0 #3d629b,0 6px 0 #274a73,0 6px 0 4px #16283e;text-shadow:2px 2px 0 #274a73;}
  .menu .mc-btn.start:active  {box-shadow:inset 4px 4px 0 #50784b,inset -4px -4px 0 #a5d29b,0 2px 0 #2f472c,0 2px 0 4px #1c2a1a;}
  .menu .mc-btn.settings:active{box-shadow:inset 4px 4px 0 #696969,inset -4px -4px 0 #cdcdcd,0 2px 0 #4a4a4a,0 2px 0 4px #2c2c2c;}
  .menu .mc-btn.scores:active {box-shadow:inset 4px 4px 0 #3d629b,inset -4px -4px 0 #8fb6e6,0 2px 0 #274a73,0 2px 0 4px #16283e;}
  .menu .mc-btn:hover{transform:translateY(-3px);filter:brightness(1.12);}
  @media(hover:none){ .menu .mc-btn:hover{transform:none;filter:none;} }
  .btns .mc-btn{animation:btnIn .5s backwards;}
  .btns .mc-btn:nth-child(1){animation-delay:.05s;}
  .btns .mc-btn:nth-child(2){animation-delay:.16s;}
  .btns .mc-btn:nth-child(3){animation-delay:.27s;}
  @keyframes btnIn{0%{opacity:0;transform:translateY(24px) scale(.92);}100%{opacity:1;transform:translateY(0) scale(1);}}

  /* ===== 戰鬥畫面 ===== */
  .battle{overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .stage{flex:1.05;position:relative;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;padding:14px;}

  .progress{display:flex;gap:10px;align-items:center;font-size:14px;font-weight:800;
    color:#fff;text-shadow:1px 1px 0 #000;letter-spacing:.06em;}
  .progress .dot{width:16px;height:16px;border-radius:4px;background:rgba(0,0,0,.35);
    border:2px solid #000;}
  .progress .dot.done{background:#78af6e;}
  .progress .dot.cur{background:#ffd23f;box-shadow:0 0 0 3px rgba(255,210,63,.4);}

  .monster-slot{position:relative;width:min(44vw,330px);aspect-ratio:1;overflow:visible;
    display:flex;align-items:center;justify-content:center;border-radius:16px;
    transition:transform .3s ease;}
  .monster-demo{width:74%;image-rendering:pixelated;filter:drop-shadow(0 10px 10px rgba(0,0,0,.18));}
  .monster-demo.hit{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-12px);}75%{transform:translateX(12px);}}

  /* 怪物待機動畫外層（與受擊/撲擊分層，互不干擾） */
  .monster-inner{display:flex;align-items:center;justify-content:center;width:100%;height:100%;will-change:transform;}
  /* 史萊姆：彈跳 squash & stretch */
  .monster-slot.m-slime .monster-inner{animation:slime-bounce 1.5s ease-in-out infinite;}
  @keyframes slime-bounce{0%,100%{transform:translateY(0) scaleY(1) scaleX(1);}
    30%{transform:translateY(9px) scaleY(.8) scaleX(1.1);}
    55%{transform:translateY(-20px) scaleY(1.08) scaleX(.95);}
    75%{transform:translateY(0) scaleY(.96) scaleX(1.02);}}
  /* 殭屍：緩慢左右搖晃（行屍） */
  .monster-slot.m-zombie .monster-inner{animation:zombie-sway 2.4s ease-in-out infinite;}
  @keyframes zombie-sway{0%,100%{transform:rotate(-5deg) translateX(-4px);}50%{transform:rotate(5deg) translateX(4px);}}
  /* 蜘蛛：左右快速小步爬動 */
  .monster-slot.m-spider .monster-inner{animation:spider-crawl 1.9s ease-in-out infinite;}
  @keyframes spider-crawl{0%,100%{transform:translateX(-16px) translateY(0);}50%{transform:translateX(16px) translateY(-5px);}}
  /* 骷髏：詭異上下浮 + 輕微抖動 */
  .monster-slot.m-skeleton .monster-inner{animation:skeleton-float 2.8s ease-in-out infinite;}
  @keyframes skeleton-float{0%,100%{transform:translateY(0) rotate(0);}
    25%{transform:translateY(-12px) rotate(2deg);}50%{transform:translateY(-3px) rotate(-2deg);}
    75%{transform:translateY(-14px) rotate(3deg);}}
  /* 大魔王龍：懸浮呼吸（boss 本已放大紅框） */
  .monster-slot.m-dragon .monster-inner{animation:dragon-hover 3.2s ease-in-out infinite;}
  @keyframes dragon-hover{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-18px) scale(1.04);}}

  /* 立體感：地面投影 + 多層陰影 */
  .monster-shadow{position:absolute;bottom:7%;left:50%;transform:translateX(-50%);
    width:52%;height:13%;border-radius:50%;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(0,0,0,.4), rgba(0,0,0,0) 72%);
    filter:blur(3px);will-change:transform,opacity;}
  .monster-inner{position:relative;z-index:1;}
  /* 怪物圖多層投影，增強厚度立體 */
  .monster-demo{filter:drop-shadow(0 6px 4px rgba(0,0,0,.25)) drop-shadow(0 16px 14px rgba(0,0,0,.16));}
  /* 各怪物地面陰影動畫（與待機動作同步） */
  .monster-slot.m-slime .monster-shadow{animation:shadow-slime 1.5s ease-in-out infinite;}
  @keyframes shadow-slime{0%,100%{transform:translateX(-50%) scale(1);opacity:.55;}
    30%{transform:translateX(-50%) scale(1.18);opacity:.72;}
    55%{transform:translateX(-50%) scale(.5);opacity:.32;}}
  .monster-slot.m-zombie .monster-shadow{animation:shadow-breath 2.4s ease-in-out infinite;}
  .monster-slot.m-spider .monster-shadow{animation:shadow-breath 1.9s ease-in-out infinite;}
  .monster-slot.m-skeleton .monster-shadow{animation:shadow-skeleton 2.8s ease-in-out infinite;}
  @keyframes shadow-breath{0%,100%{transform:translateX(-50%) scale(.92);opacity:.5;}50%{transform:translateX(-50%) scale(1.06);opacity:.62;}}
  @keyframes shadow-skeleton{0%,100%{transform:translateX(-50%) scale(1);opacity:.55;}
    25%{transform:translateX(-50%) scale(.7);opacity:.4;}50%{transform:translateX(-50%) scale(.9);opacity:.5;}
    75%{transform:translateX(-50%) scale(.65);opacity:.38;}}
  .monster-slot.m-dragon .monster-shadow{animation:shadow-dragon 3.2s ease-in-out infinite;width:64%;height:15%;}
  @keyframes shadow-dragon{0%,100%{transform:translateX(-50%) scale(1);opacity:.6;}50%{transform:translateX(-50%) scale(.66);opacity:.4;}}
  /* Boss 增強光澤立體（紅色外發光） */
  .monster-slot.boss .monster-demo{filter:drop-shadow(0 6px 5px rgba(0,0,0,.3)) drop-shadow(0 16px 14px rgba(0,0,0,.18)) drop-shadow(0 0 14px rgba(255,90,90,.45));}

  /* 玩家攻擊：斬擊特效 */
  .slash{position:absolute;top:50%;left:50%;width:130%;height:14px;z-index:6;
    transform:translate(-50%,-50%) rotate(-32deg) scaleX(0);transform-origin:center;
    background:linear-gradient(90deg,transparent,#fff 42%,#b7f4ff 56%,transparent);
    border-radius:8px;opacity:0;pointer-events:none;filter:drop-shadow(0 0 8px #9ef);}
  .slash.go{animation:slash .45s ease-out;}
  @keyframes slash{
    0%{opacity:0;transform:translate(-50%,-50%) rotate(-32deg) scaleX(0);}
    30%{opacity:1;}
    55%{opacity:1;transform:translate(-50%,-50%) rotate(-32deg) scaleX(1.12);}
    100%{opacity:0;transform:translate(-50%,-50%) rotate(-32deg) scaleX(1.12);}}
  .monster-slot.flash{border-color:#ff6b6b;box-shadow:0 0 26px rgba(255,80,80,.7);}

  /* Boss 怪物特別樣式 */
  .monster-slot.boss{border-color:#ff5b5b;box-shadow:0 0 26px rgba(255,80,80,.45);}
  .monster-slot.boss .monster-demo{width:84%;}
  .progress .dot.boss{background:#9b5bff;border-color:#ff5b5b;}

  /* 怪物反擊：向前下方撲擊 */
  .monster-demo.attack{animation:lunge .5s ease;}
  @keyframes lunge{0%{transform:translateY(0) scale(1);}
    35%{transform:translateY(34px) scale(1.22);}
    55%{transform:translateY(34px) scale(1.22);}
    100%{transform:translateY(0) scale(1);}}

  /* 受傷全屏紅閃 */
  .hurt-flash{position:fixed;inset:0;z-index:25;pointer-events:none;opacity:0;
    background:radial-gradient(ellipse at center,transparent 38%,rgba(200,0,0,.55) 100%);}
  .hurt-flash.go{animation:hurtflash .5s ease;}
  @keyframes hurtflash{0%{opacity:0;}18%{opacity:1;}100%{opacity:0;}}
  .player-hp.shake-hp{animation:hpshake .42s;}
  @keyframes hpshake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}
    40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
  .slot-label{position:absolute;bottom:10px;font-size:14px;font-weight:800;color:#fff;
    background:rgba(0,0,0,.45);padding:3px 12px;border-radius:5px;letter-spacing:.1em;}

  .hp{width:min(82%,440px);display:flex;align-items:center;gap:10px;}
  .hp-label{font-size:14px;font-weight:800;color:#fff;min-width:70px;text-shadow:1px 1px 0 #000;letter-spacing:.1em;}
  .hp-track{flex:1;height:22px;background:rgba(0,0,0,.4);border:2px solid #000;border-radius:4px;overflow:hidden;}
  .hp-fill{height:100%;width:100%;background:linear-gradient(180deg,#8ef08e,#46b446);transition:width .35s ease;}
  .hp-fill.player{background:linear-gradient(180deg,#8fb6ff,#3d7bdc);}

  .panel{flex:1;background:linear-gradient(180deg,#3a3a42,#26262c);
    border-top:6px solid #16161a;padding:18px clamp(14px,4vw,44px) 22px;
    display:flex;flex-direction:column;gap:16px;box-shadow:0 -10px 22px rgba(0,0,0,.32);}

  .qbox{position:relative;overflow:hidden;background:rgba(255,255,255,.94);border:3px solid #16161a;border-radius:10px;padding:14px 18px;
    box-shadow:inset 0 2px 0 rgba(255,255,255,.6),0 6px 0 rgba(0,0,0,.12);}
  .qbox::before{content:'';position:absolute;left:0;right:0;top:0;height:5px;
    background:repeating-linear-gradient(90deg,#78af6e 0 12px,#5e9a55 12px 24px);opacity:.95;}
  .q-label{font-size:13px;color:#b5791a;font-weight:800;letter-spacing:.22em;}
  .q-text{font-size:clamp(22px,4.4vw,34px);font-weight:800;color:#222;margin-top:4px;}

  .answers{display:flex;flex-direction:column;gap:14px;}
  .answer-display{background:rgba(255,255,255,.96);border:3px solid #16161a;border-radius:10px;
    min-height:66px;display:flex;align-items:center;justify-content:flex-end;padding:0 18px;
    font-size:clamp(28px,6vw,40px);font-weight:900;color:#1a1a1a;letter-spacing:.04em;}
  .answer-display.empty::before{content:'點擊數字鍵作答';font-size:20px;font-weight:700;color:#b9b9b9;}
  .answer-display.show-correct{background:#bff5bf;animation:ansShimmer .7s ease;}
  @keyframes ansShimmer{0%{box-shadow:0 0 0 0 rgba(120,255,120,0);}40%{box-shadow:0 0 24px 3px rgba(120,255,120,.75);}100%{box-shadow:0 0 0 0 rgba(120,255,120,0);}}
  .answer-display.flash-err{animation:err-flash .45s;}
  @keyframes err-flash{0%,100%{background:rgba(255,255,255,.96);}50%{background:#ff9a9a;}}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .np-key{font-family:inherit;font-size:clamp(20px,5vw,28px);font-weight:900;color:#fff;
    border:none;border-radius:10px;min-height:64px;cursor:pointer;user-select:none;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
    background:#5b8bd0;box-shadow:inset 3px 3px 0 #8fb6e6,inset -3px -3px 0 #3d629b,0 5px 0 #274a73,0 5px 0 4px #16283e;text-shadow:2px 2px 0 #274a73;
    animation:keyIn .34s backwards;}
  .numpad .np-key:nth-child(1){animation-delay:.02s;}
  .numpad .np-key:nth-child(2){animation-delay:.05s;}
  .numpad .np-key:nth-child(3){animation-delay:.08s;}
  .numpad .np-key:nth-child(4){animation-delay:.11s;}
  .numpad .np-key:nth-child(5){animation-delay:.14s;}
  .numpad .np-key:nth-child(6){animation-delay:.17s;}
  .numpad .np-key:nth-child(7){animation-delay:.20s;}
  .numpad .np-key:nth-child(8){animation-delay:.23s;}
  .numpad .np-key:nth-child(9){animation-delay:.26s;}
  .numpad .np-key:nth-child(10){animation-delay:.29s;}
  .numpad .np-key:nth-child(11){animation-delay:.32s;}
  .numpad .np-key:nth-child(12){animation-delay:.35s;}
  .np-key:hover{filter:brightness(1.1);transform:translateY(-2px);}
  @media(hover:none){ .np-key:hover{transform:none;filter:none;} }
  @keyframes keyIn{0%{opacity:0;transform:translateY(14px) scale(.9);}100%{opacity:1;transform:translateY(0) scale(1);}}
  .np-key:active{transform:translateY(3px);box-shadow:inset 3px 3px 0 #3d629b,inset -3px -3px 0 #8fb6e6,0 2px 0 #274a73,0 2px 0 4px #16283e;}
  .np-key[data-k="del"]{background:#a0a0a0;box-shadow:inset 3px 3px 0 #cdcdcd,inset -3px -3px 0 #696969,0 5px 0 #4a4a4a,0 5px 0 4px #2c2c2c;text-shadow:2px 2px 0 #4a4a4a;}
  .np-key[data-k="neg"]{background:#78af6e;box-shadow:inset 3px 3px 0 #a5d29b,inset -3px -3px 0 #50784b,0 5px 0 #2f472c,0 5px 0 4px #1c2a1a;text-shadow:2px 2px 0 #2f472c;}
  .np-key[data-k="enter"]{grid-column:1 / -1;background:#d8a93a;font-size:clamp(20px,5vw,26px);box-shadow:inset 3px 3px 0 #f0cf72,inset -3px -3px 0 #a87f1f,0 5px 0 #7a5c14,0 5px 0 4px #4a3710;text-shadow:2px 2px 0 #7a5c14;}
  .numpad.disabled{pointer-events:none;opacity:.6;}

  .player-hp{margin:auto calc(-1 * clamp(14px,4vw,44px)) 0;padding:10px clamp(14px,4vw,44px) 14px;
    position:sticky;bottom:0;z-index:4;background:#26262c;
    border-top:1px solid rgba(0,0,0,.4);}

  /* 題目框內連擊徽章（答題途中常駐顯示） */
  .q-head{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .combo-badge{font-size:17px;font-weight:900;color:#8a8a8a;
    background:rgba(0,0,0,.28);border:2px solid #000;border-radius:8px;
    padding:4px 12px;letter-spacing:.04em;white-space:nowrap;
    text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000;
    transition:color .18s ease,transform .18s ease,background .18s ease;
    opacity:.7;}
  .combo-badge.show{opacity:1;color:#ffd23f;background:rgba(0,0,0,.45);}
  .combo-badge.pop{animation:pop-badge .45s ease;}
  @keyframes pop-badge{0%{transform:scale(1);}35%{transform:scale(1.22);}100%{transform:scale(1);}}
  .q-head-right{display:flex;align-items:center;gap:8px;}

  /* 題目框內計時（計時挑戰模式）*/
  .timer-badge{font-size:17px;font-weight:900;color:#fff;
    background:rgba(0,0,0,.4);border:2px solid #000;border-radius:8px;
    padding:4px 11px;letter-spacing:.03em;white-space:nowrap;
    text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000;}
  .timer-badge.urgent{color:#ff6b6b;animation:timer-pulse .5s ease-in-out infinite;}
  @keyframes timer-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.14);}}
  .timer-bar{height:10px;background:rgba(0,0,0,.32);border:2px solid #000;border-radius:6px;
    overflow:hidden;margin-bottom:10px;}
  .timer-fill{height:100%;width:100%;
    background:linear-gradient(180deg,#8ef08e,#46b446);transition:width .12s linear;}

  /* 設定：計時挑戰開關 */
  .toggle-btn{font-size:19px;padding:15px;font-weight:800;border:3px solid #16161a;border-radius:10px;
    cursor:pointer;color:#fff;letter-spacing:.06em;background:#52525c;width:100%;
    box-shadow:inset 3px 3px 0 rgba(255,255,255,.18),inset -3px -3px 0 rgba(0,0,0,.3);}

  /* ===== 音效引擎（Web Audio API 合成，自包含、無外部檔）===== */
  const Sfx = {
    ctx:null, muted:false,
    init(){
      if(!this.ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        this.ctx = new AC();
      }
      if(this.ctx.state === 'suspended') this.ctx.resume();
    },
    tone(freq, dur, type='square', vol=0.18, when=0){
      if(this.muted) return;
      this.init();
      const t = this.ctx.currentTime + when;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(g); g.connect(this.ctx.destination);
      osc.start(t); osc.stop(t + dur + 0.03);
    },
    click(){ this.tone(420, 0.07, 'square', 0.14); },
    start(){ [523,659,784,1047].forEach((f,i)=>this.tone(f,0.18,'square',0.17,i*0.09)); },
    select(){ this.tone(330, 0.09, 'triangle', 0.15); },
    correct(){ this.tone(659,0.12,'square',0.2); this.tone(988,0.24,'square',0.2,0.1); },
    wrong(){ this.tone(220,0.22,'sawtooth',0.2); this.tone(130,0.34,'sawtooth',0.2,0.12); },
    slash(){ this.tone(1200,0.05,'square',0.16); this.tone(760,0.09,'square',0.14,0.04); },
    counter(){ this.tone(170,0.16,'sawtooth',0.22); this.tone(90,0.3,'sawtooth',0.2,0.08); },
    win(){ [523,659,784,1047,1319].forEach((f,i)=>this.tone(f,0.22,'square',0.2,i*0.12)); },
    lose(){ [392,330,262,196].forEach((f,i)=>this.tone(f,0.28,'sawtooth',0.2,i*0.14)); }
  };

  /* ===== 遊戲數據 ===== */
  const MONSTERS = [
    {name:'史萊姆',    img:'monster_slime.png',     hp:6, boss:false, cls:'m-slime'},

  const state = {

  try{ const t = localStorage.getItem('mcMathTimed'); if(t) state.timed = (t==='1'); }catch(e){}
  let best = {score:0, acc:0, wins:0, maxCombo:0};
  try{ const b = localStorage.getItem('mcMathBest'); if(b) best = JSON.parse(b); }catch(e){}

  /* ===== 題目生成 ===== */
  function ri(a,b){ return a + Math.floor(Math.random()*(b-a+1)); }
  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
  }
  function makeQuestion(){
    const d = state.diff;
    const N = ri(2,4);                 // 運算元（數）個數：2、3 或 4
    const allowMul = d!=='easy';
    const allowDiv = d==='hard';
    const valLim = d==='easy'?20 : (d==='hard'?99:50);
    const mulLim = d==='easy'?9  : (d==='hard'?15:12);

    // 生成「項」：每項是一個數，或（×、÷ 的）乘積／商
    function genTerm(){
      const r = Math.random();
      if(allowDiv && r<0.30){            // x ÷ y（必整除）
        const y = ri(2,9), x = y*ri(2,12);
        return {text:`${x} ÷ ${y}`, value:x/y, ops:2};
      }
      if(allowMul && r<0.62){            // x × y
        const x = ri(2,9), y = ri(2,mulLim);
        return {text:`${x} × ${y}`, value:x*y, ops:2};
      }
      const v = ri(1,valLim);            // 單一數
      return {text:`${v}`, value:v, ops:1};
    }
    function genCompound(){              // 必定是 × 或 ÷ 的項
      if(allowDiv && Math.random()<0.5){
        const y = ri(2,9), x = y*ri(2,12);
        return {text:`${x} ÷ ${y}`, value:x/y, ops:2};
      }
      const x = ri(2,9), y = ri(2,mulLim);
      return {text:`${x} × ${y}`, value:x*y, ops:2};
    }

    const forceMix = (d!=='easy') && N>=3;   // 普通／困難的 3–4 數題必含 ×（或 ÷）
    const terms=[]; let used=0, first=true, guard=0;
    while(used<N && guard++<30){
      let term;
      const rem = N-used;
      if(first && forceMix){ term=genCompound(); }
      else if(rem===1 || (!allowMul && !allowDiv)){
        const v=ri(1,valLim); term={text:`${v}`, value:v, ops:1};
      } else {
        term=genTerm();
        if(term.ops>rem){ const v=ri(1,valLim); term={text:`${v}`, value:v, ops:1}; }
      }
      term.sign = first ? 1 : (Math.random()<0.5?1:-1);
      terms.push(term); used+=term.ops; first=false;
    }

    // 先乘除後加減：每項先算好、再按正負號加總（與標準運算次序一致）
    let total = terms.reduce((s,t)=> s + t.sign*t.value, 0);
    if(total<0){ terms.forEach(t=> t.sign=-t.sign); total=-total; }   // 保證答案非負

    const parts = terms.map((t,i)=>{
      const body = (t.sign<0 && t.ops>1) ? `(${t.text})` : t.text;
      if(i===0) return (t.sign<0 ? '− '+body : body);
      return (t.sign<0 ? ' − ' : ' + ') + body;
    });
    return {text: parts.join('')+' = ?', ans: total};
  }

  /* ===== DOM ===== */
  const $ = id => document.getElementById(id);
  const menu=$('menu'), battle=$('battle');
  const monsterImg=$('monster-img'), monsterName=$('monster-name');
  const monsterHp=$('monster-hp'), playerHp=$('player-hp');
  const qText=$('q-text'), hud=$('hud'), progress=$('progress');
  const answerDisplay=$('answer-display'), answerText=$('answer-text'), numpad=$('numpad');
  const toast=$('toast');
  const comboEl=$('combo');
  const timerBar=$('timer-bar'), timerFill=$('timer-fill'), timerBadge=$('timer-badge');

  function refreshDiff(){
    const map={easy:'簡單',normal:'普通',hard:'困難'};
    $('diff-now').textContent='難度：'+map[state.diff];
  }
  refreshDiff();

  function show(target){
    [menu,battle].forEach(s=>s.classList.add('hidden'));
    target.classList.remove('hidden');
    if(target===menu) stopTimer();   // 返回主選單立即停止計時，避免主界面出現「時間到」
  }
  function fmtTime(ms){
    const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
  }
  function showToast(txt){
    clearTimeout(toast._t);
    toast.textContent=txt; toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show');
    toast._t=setTimeout(()=> toast.classList.remove('show'), 750);
  }
  function showCombo(){
    if(state.combo>=2){
      comboEl.textContent='連擊 ×'+state.combo;
      comboEl.classList.add('show');
      comboEl.classList.remove('pop'); void comboEl.offsetWidth; comboEl.classList.add('pop');
    } else {
      comboEl.classList.remove('show','pop');
    }
  }

  /* ===== 計時挑戰模式 ===== */
  const TIME_LIMIT = {easy:15, normal:20, hard:30};
  const TIME_BONUS_MAX = 20;   // 計時挑戰：剩餘時間滿額最多 +20 分
  let timerId = null;
  let timerRemain = 0;         // 當前剩餘秒數（由 tick 更新，供答對計分用）
  function stopTimer(){
    if(timerId){ clearInterval(timerId); timerId=null; }
    timerBar.style.display='none'; timerBadge.style.display='none';
  }
  function startTimer(){
    stopTimer();
    if(!state.timed) return;
    const total = TIME_LIMIT[state.diff] || 20;
    timerBar.style.display='block'; timerBadge.style.display='block';
    timerFill.style.width='100%'; timerBadge.classList.remove('urgent');
    const end = Date.now()+total*1000;
    const tick = ()=>{
      const remain = Math.max(0, (end-Date.now())/1000);
      timerRemain = remain;
      timerFill.style.width = (remain/total*100)+'%';
      timerBadge.textContent = '⏱ '+Math.ceil(remain);
      if(remain<=5) timerBadge.classList.add('urgent'); else timerBadge.classList.remove('urgent');
      if(remain<=0){ stopTimer(); onTimeout(); }
    };
    tick();
    timerId = setInterval(tick, 100);
  }
  function failAnswer(msg){
    state.combo=0; showCombo();
    answerText.textContent = state.currentAnswer;            // 填充題：顯示正確答案
    answerDisplay.classList.remove('show-correct'); answerDisplay.classList.add('flash-err');
    state.pHp--; renderHp(); Sfx.wrong(); showToast(msg);
    monsterCounter();
    setTimeout(()=>{
      if(state.pHp<=0){ endGame(false); return; }
      newQuestion();
    }, 1100);
  }
  function onTimeout(){
    if(state.locked) return;
    state.locked=true;
    numpad.classList.add('disabled');
    failAnswer('時間到！');
  }

  /* ===== 戰鬥流程 ===== */
  function renderHp(){
    monsterHp.style.width = (state.mHp/MONSTERS[state.mIdx].hp*100)+'%';
    playerHp.style.width  = (state.pHp/PLAYER_MAX_HP*100)+'%';
  }
  function renderProgress(){
    progress.innerHTML='';
    MONSTERS.forEach((m,i)=>{
      const d=document.createElement('span'); d.className='dot';
      if(i<state.mIdx) d.classList.add('done');
      else if(i===state.mIdx){ d.classList.add('cur'); if(MONSTERS[i].boss) d.classList.add('boss'); }
      progress.appendChild(d);
    });
    const lbl=document.createElement('span');
    lbl.textContent=`怪物 ${state.mIdx+1}/${MONSTERS.length} · ${MONSTERS[state.mIdx].name}`;
    progress.appendChild(lbl);
  }
  function loadMonster(){
    const m=MONSTERS[state.mIdx];
    state.mHp=m.hp;
    // 切換怪物專屬待機動畫 class（先移除其他 m-*，避免殘留）
    monsterSlot.classList.remove('boss','m-slime','m-zombie','m-spider','m-skeleton','m-dragon','defeated','entering');
    monsterSlot.classList.add(m.cls);
    if(m.boss) monsterSlot.classList.add('boss');   // Boss 怪物紅框+放大
    monsterImg.src=m.img; monsterName.textContent=m.name;
    renderHp(); renderProgress();
    // 入場動畫：從上方彈入 + 光暈閃現
    void monsterSlot.offsetWidth;
    monsterSlot.classList.add('entering');
    setTimeout(()=>monsterSlot.classList.remove('entering'),700);
  }
  function defeatMonster(){
    spawnDefeat();
    monsterSlot.classList.add('defeated');
  }
  function newQuestion(){
    if(battle.classList.contains('hidden')) return;   // 已離開戰鬥（如返回主選單）則不生成新題、不啟動計時
    state.locked=false;
    inputStr=''; renderInput();
    answerDisplay.classList.remove('show-correct','flash-err');
    numpad.classList.remove('disabled');
    const q=makeQuestion(); state.currentAnswer=q.ans; state.asked++;
    qText.textContent=q.text;
    startTimer();
  }
  function startBattle(){
    state.mIdx=0; state.pHp=PLAYER_MAX_HP; state.score=0; state.asked=0; state.right=0;
    state.combo=0; state.maxCombo=0; state.startTime=Date.now();
    hud.textContent='得分 0'; showCombo();
    spawnEmbers();
    loadMonster(); newQuestion();
  }

  /* ===== 攻擊 / 反擊小動畫 ===== */
  const slashEl=$('slash'), monsterSlot=$('monster-slot'), hurtFlash=$('hurt-flash');
  const playerHpBox=document.querySelector('.player-hp');
  function replay(el, cls){ el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls); }
  function playerAttack(){          // 答對：玩家斬擊 → 怪物受擊
    Sfx.slash();
    replay(slashEl,'go');
    replay(monsterImg,'hit');
    replay(monsterSlot,'flash');
    spawnHit();
    if(state.combo>=3) spawnCombo();
    setTimeout(()=>monsterSlot.classList.remove('flash'),300);
  }
  function monsterCounter(){        // 答錯：怪物撲擊 → 全屏紅閃 + 血條抖動
    replay(monsterImg,'attack');
    setTimeout(()=>{ Sfx.counter(); replay(hurtFlash,'go'); replay(playerHpBox,'shake-hp'); spawnSplat(); },160);
  }

  /* ===== 粒子特效（Web Animations API，自包含、無外部檔）===== */
  function burst(cx, cy, opts){
    opts = opts || {};
    const n = opts.count || 12;
    const colors = opts.colors || ['#ffd23f','#ffffff','#ffae42'];
    const spd = opts.speed || 120;
    const layer = battle;
    for(let i=0;i<n;i++){
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.background = colors[i % colors.length];
      p.style.left = cx+'px'; p.style.top = cy+'px';
      const sz = opts.size || (6 + Math.random()*6);
      p.style.width = sz+'px'; p.style.height = sz+'px';
      layer.appendChild(p);
      const ang = Math.random()*Math.PI*2;
      const v = spd*(0.4 + Math.random()*0.9);
      const dx = Math.cos(ang)*v;
      const dy = Math.sin(ang)*v - (opts.lift||40);
      const rot = (Math.random()*2-1)*360;
      const dur = opts.dur || (520 + Math.random()*260);
      const anim = p.animate([
        {transform:'translate(-50%,-50%) translate(0,0) rotate(0deg)', opacity:1},
        {transform:'translate(-50%,-50%) translate('+dx+'px,'+(dy+170)+'px) rotate('+rot+'deg)', opacity:0}
      ], {duration:dur, easing:'cubic-bezier(.2,.6,.3,1)'});
      anim.onfinish = ()=> p.remove();
    }
  }
  function monsterCenter(){
    const r = monsterSlot.getBoundingClientRect();
    const b = battle.getBoundingClientRect();
    return {x: r.left - b.left + r.width/2, y: r.top - b.top + r.height/2};
  }
  function playerCenter(){
    const r = playerHpBox.getBoundingClientRect();
    const b = battle.getBoundingClientRect();
    return {x: r.left - b.left + r.width/2, y: r.top - b.top + r.height/2};
  }
  function spawnHit(){ const c=monsterCenter(); burst(c.x,c.y,{count:14,colors:['#ffffff','#ffe08a','#ffd23f','#9ef'],speed:155,size:7,dur:560}); }
  function spawnDefeat(){ const c=monsterCenter(); burst(c.x,c.y,{count:24,colors:['#ffffff','#ffd23f','#ff9a3f','#ff6b6b'],speed:210,size:9,dur:800,lift:80}); }
  function spawnSplat(){ const c=playerCenter(); burst(c.x,c.y-12,{count:12,colors:['#ff5b5b','#ff8a8a','#c0c0c0'],speed:130,size:7,dur:560}); }
  function spawnCombo(){ const c=monsterCenter(); burst(c.x,c.y-46,{count:10,colors:['#ffd23f','#ffffff','#9ef'],speed:120,size:5,dur:620}); }
  function spawnEmbers(){
    const box=$('embers'); if(!box) return;
    box.innerHTML='';
    for(let i=0;i<9;i++){
      const e=document.createElement('div'); e.className='ember';
      e.style.left=(Math.random()*100)+'%';
      const dur=6+Math.random()*6;
      e.style.animationDuration=dur+'s';
      e.style.animationDelay=(-Math.random()*dur)+'s';
      const s=3+Math.random()*4; e.style.width=s+'px'; e.style.height=s+'px';
      box.appendChild(e);
    }
  }

  /* ===== 填充題：數字鍵盤輸入 ===== */
  let inputStr='';
  function renderInput(){
    answerText.textContent = inputStr;
    answerDisplay.classList.toggle('empty', inputStr==='');
  }
  function pressKey(k){
    if(state.locked) return;
    if(k>='0' && k<='9'){
      if(inputStr.replace('-','').length>=9) return;
      inputStr += k; renderInput(); Sfx.select(); return;
    }
    if(k==='del'){ inputStr=inputStr.slice(0,-1); renderInput(); Sfx.select(); return; }
    if(k==='neg'){
      inputStr = inputStr.startsWith('-') ? inputStr.slice(1) : (inputStr==='' ? '-' : '-'+inputStr);
      renderInput(); Sfx.select(); return;
    }
    if(k==='enter'){ onSubmit(); return; }
  }
  function onSubmit(){
    if(state.locked) return;
    if(inputStr==='' || inputStr==='-'){            // 未輸入：提示一下，不消耗時間
      answerDisplay.classList.remove('flash-err'); void answerDisplay.offsetWidth; answerDisplay.classList.add('flash-err');
      return;
    }
    const remain = timerRemain;
    stopTimer();
    const val = parseInt(inputStr,10);
    if(isNaN(val)) return;
    state.locked=true;
    numpad.classList.add('disabled');
    const correct = (val===state.currentAnswer);
    if(correct){
      answerDisplay.classList.add('show-correct');
      state.right++; state.combo++;
      if(state.combo>state.maxCombo) state.maxCombo=state.combo;
      const bonus = Math.min((state.combo-1)*5, 25);   // 第 2 連擊起每題 +5，封頂 +25
      const timeBonus = state.timed ? Math.round(remain/(TIME_LIMIT[state.diff]||20)*TIME_BONUS_MAX) : 0;
      const gained = SCORE_PER + bonus + timeBonus;
      state.score += gained;
      hud.textContent='得分 '+state.score;
      showCombo();
      Sfx.correct(); showToast('答對！ +'+gained);
      playerAttack();
      state.mHp--; renderHp();
      setTimeout(()=>{
        if(state.mHp<=0){
          defeatMonster();
          setTimeout(()=>{
            if(state.mIdx>=MONSTERS.length-1){ endGame(true); return; }
            state.mIdx++; loadMonster(); showToast(MONSTERS[state.mIdx].name+' 出現！');
            newQuestion();
          }, 640);
        } else {
          newQuestion();
        }
      }, 850);
    } else {
      failAnswer('答錯！');
    }
  }
  numpad.querySelectorAll('.np-key').forEach(btn=>{
    btn.addEventListener('click', ()=> pressKey(btn.dataset.k));
  });
  // 實體/桌面鍵盤支援（iPad 主要用屏幕鍵盤，此為輔助）
  window.addEventListener('keydown',(e)=>{
    if(battle.classList.contains('hidden')) return;
    if(e.key>='0' && e.key<='9'){ pressKey(e.key); }
    else if(e.key==='Backspace'){ e.preventDefault(); pressKey('del'); }
    else if(e.key==='Enter'){ e.preventDefault(); pressKey('enter'); }
    else if(e.key==='-'||e.key==='±'){ pressKey('neg'); }
  });

  function spawnConfetti(win){
    const box=$('confetti'); if(!box) return; box.innerHTML='';
    const colors = win
      ? ['#ffd23f','#ff8a3f','#78af6e','#5b8bd0','#ff6b6b','#ffffff']
      : ['#8a8a8a','#b5b5b5','#6f6f6f','#cfcfcf'];
    const n = win? 32: 14;
    for(let i=0;i<n;i++){
      const p=document.createElement('i'); p.style.background=colors[i%colors.length];
      p.style.left=(Math.random()*100)+'%';
      const dur=2.3+Math.random()*2.4; p.style.animationDuration=dur+'s';
      p.style.animationDelay=(Math.random()*0.9)+'s';
      const w=7+Math.random()*7; p.style.width=w+'px'; p.style.height=(w*1.4)+'px';
      p.style.borderRadius = (Math.random()<0.5)?'2px':'50%';
      box.appendChild(p);
    }
    setTimeout(()=>{ if(box) box.innerHTML=''; }, 5400);
  }
  function endGame(win){
    stopTimer();
    const monsBeat = win ? MONSTERS.length : state.mIdx;
    const time = Date.now()-state.startTime;
    const acc = state.asked? Math.round(state.right/state.asked*100):0;
    if(state.maxCombo>best.maxCombo) best.maxCombo=state.maxCombo;
    if(win){
      best.wins++;
      if(state.score>best.score) best.score=state.score;
      if(acc>best.acc) best.acc=acc;
      try{ localStorage.setItem('mcMathBest', JSON.stringify(best)); }catch(e){}
    }
    $('result-title').textContent = win?'勝利！':'失敗…';
    $('result-sub').textContent   = win? '你打敗了所有怪物！' : '玩家 HP 耗盡，再試一次吧！';
    $('r-score').textContent = state.score;
    $('r-right').textContent = state.right+' / '+state.asked;
    $('r-mon').textContent   = monsBeat+' / '+MONSTERS.length;
    $('r-time').textContent  = fmtTime(time);
    $('r-combo').textContent = state.maxCombo;
    win?Sfx.win():Sfx.lose();
    $('overlay-result').classList.remove('hidden');
    spawnConfetti(win);
  }

  /* ===== 按鈕綁定 ===== */
  $('btn-start').addEventListener('click', ()=>{ Sfx.start(); show(battle); startBattle(); });
  $('btn-back').addEventListener('click', ()=> show(menu));
  $('btn-settings').addEventListener('click', ()=>{
    stopTimer();   // 遊戲中打開設定先暫停計時
    document.querySelectorAll('.diff-btn').forEach(x=>x.classList.toggle('sel', x.dataset.diff===state.diff));
    refreshDiff(); refreshTimed();
    $('overlay-settings').classList.remove('hidden');
  });
  $('btn-scores').addEventListener('click', ()=>{
    stopTimer();   // 遊戲中打開成績先暫停計時
    $('s-best').textContent=best.score;
    $('s-acc').textContent=best.acc+'%';
    $('s-wins').textContent=best.wins;
    $('s-combo').textContent=best.maxCombo;
    $('overlay-scores').classList.remove('hidden');
  });
  document.querySelectorAll('.diff-btn').forEach(x=> x.addEventListener('click',()=>{
    state.diff=x.dataset.diff;
    try{ localStorage.setItem('mcMathDiff', state.diff); }catch(e){}
    document.querySelectorAll('.diff-btn').forEach(o=>o.classList.toggle('sel', o===x));
    refreshDiff();
  }));
  $('btn-set-close').addEventListener('click', ()=>{
    $('overlay-settings').classList.add('hidden');
    if(!battle.classList.contains('hidden')) startTimer();   // 仍在戰鬥則恢復計時
  });
  const timedToggle=$('timed-toggle');
  function refreshTimed(){
    timedToggle.classList.toggle('on', state.timed);
    timedToggle.textContent = state.timed ? '計時挑戰：開啟' : '計時挑戰：關閉';
  }
  timedToggle.addEventListener('click', ()=>{
    state.timed=!state.timed;
    try{ localStorage.setItem('mcMathTimed', state.timed?'1':'0'); }catch(e){}
    refreshTimed();
  });
  refreshTimed();   // 頁面載入時同步開關顯示（讀自 localStorage）
  $('btn-score-close').addEventListener('click', ()=>{
    $('overlay-scores').classList.add('hidden');
    if(!battle.classList.contains('hidden')) startTimer();   // 仍在戰鬥則恢復計時
  });
  $('btn-again').addEventListener('click', ()=>{ $('overlay-result').classList.add('hidden'); show(battle); startBattle(); });
  $('btn-tomenu').addEventListener('click', ()=>{ $('overlay-result').classList.add('hidden'); show(menu); });

  // 全站按鈕點擊聲（結算/設定/成績內的按鈕）
  document.querySelectorAll('.mc-btn, .diff-btn').forEach(b=>{
    b.addEventListener('click', ()=>{ if(!b.classList.contains('ans-correct')) Sfx.click(); });
  });

  // 靜音掣
  const sToggle=$('sound-toggle');
  sToggle.addEventListener('click', ()=>{
    Sfx.muted=!Sfx.muted;
    sToggle.textContent = Sfx.muted?'🔇':'🔊';
    if(!Sfx.muted) Sfx.click();
  });
</script>
</body>
</html>
